apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-backend-migration
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend-migration
    spec:
    {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
    {{- end }}
      restartPolicy: Never
      containers:
        - name: migration
          image: {{ .Values.backend.image | quote }}
          imagePullPolicy: {{ .Values.backend.imagePullPolicy }}
          command:
            - bun
            - run
            - db:migrate
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key: DATABASE_URL